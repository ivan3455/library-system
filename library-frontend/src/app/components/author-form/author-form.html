<div class="card">
  <h2>{{ isEditMode ? 'Edit' : 'Add' }} Author</h2>
  <form [formGroup]="authorForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Name</label>
      <input type="text" formControlName="name" class="form-control">
    </div>
    <div class="form-group">
      <label>Bio</label>
      <textarea formControlName="bio" class="form-control"></textarea>
    </div>
    <button type="submit" [disabled]="authorForm.invalid" class="btn-submit">Save</button>
    <a routerLink="/authors" class="btn-cancel">Cancel</a>
  </form>
</div>
