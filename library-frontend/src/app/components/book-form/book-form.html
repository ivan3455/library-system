<div class="card">
  <h2>{{ isEditMode ? 'Edit' : 'Add' }} Book</h2>

  <form [formGroup]="bookForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Title</label>
      <input type="text" formControlName="title" class="form-control">
    </div>

    <div class="form-group">
      <label>ISBN</label>
      <input type="text" formControlName="isbn" class="form-control">
    </div>

    <div class="form-group">
      <label>Author</label>
      <select formControlName="author_id" class="form-control">
        <option value="">Select Author</option>
        <option *ngFor="let author of authors" [value]="author.id">
          {{ author.name }}
        </option>
      </select>
    </div>

    <div class="form-group">
      <label>Published Year</label>
      <input type="number" formControlName="published_year" class="form-control">
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="bookForm.invalid" class="btn-submit">
        Save
      </button>
      <a routerLink="/books" class="btn-cancel">Cancel</a>
    </div>
  </form>
</div>
