<div class="login-container">
    <div class="login-card">
        <h2>Login to Library</h2>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input id="email" type="email" formControlName="email" placeholder="email@example.com">
                <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="error">
                    Please enter a valid email.
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" formControlName="password" placeholder="********">
                <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="error">
                    Password must be at least 8 characters.
                </div>
            </div>

            <div *ngIf="errorMessage" class="server-error">
                {{ errorMessage }}
            </div>

            <button type="submit" [disabled]="loginForm.invalid" class="btn-submit">
                Login
            </button>
        </form>

        <p class="footer-text">
            Don't have an account? <a routerLink="/register">Register here</a>
        </p>
    </div>
</div>
